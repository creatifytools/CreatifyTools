<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator | CreatifyTools</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .options { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
    .options label { display: flex; align-items: center; gap: 8px; }
    .password-box { background: white; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 600; letter-spacing: 1px; word-break: break-all; margin: 20px 0; border: 1px solid #eee; text-align: center; }
    input[type="number"] { width: 80px; padding: 8px; margin: 0; }
  </style>
</head>
<body>
  <div class="tool-page-container">
    <a href="../index.html" class="back-link">← Back to Tools</a>
    <div class="tool-card-custom" style="text-align: center;">
      <h1>🔐 Password Generator</h1>
      <p>Generate strong random passwords</p>
      <div class="options">
        <label><input type="checkbox" id="uppercase" checked> A-Z</label>
        <label><input type="checkbox" id="lowercase" checked> a-z</label>
        <label><input type="checkbox" id="numbers" checked> 0-9</label>
        <label><input type="checkbox" id="symbols" checked> !@#$%</label>
        <label>Length: <input type="number" id="length" value="12" min="4" max="32"></label>
      </div>
      <button id="generatePassBtn" class="btn">Generate Password</button>
      <button id="copyBtn" class="btn btn-secondary" style="display:none">Copy Password</button>
      <div class="password-box" id="passwordDisplay">Click Generate</div>
    </div>
  </div>
  <script src="../js/script.js"></script>
  <script>
    const generateBtn = document.getElementById('generatePassBtn');
    const copyBtn = document.getElementById('copyBtn');
    const passwordDisplay = document.getElementById('passwordDisplay');
    let currentPassword = '';

    function generatePassword() {
      const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const lower = 'abcdefghijklmnopqrstuvwxyz';
      const numbers = '0123456789';
      const symbols = '!@#$%^&*()_+[]{}<>?';
      let chars = '';
      if (document.getElementById('uppercase').checked) chars += upper;
      if (document.getElementById('lowercase').checked) chars += lower;
      if (document.getElementById('numbers').checked) chars += numbers;
      if (document.getElementById('symbols').checked) chars += symbols;
      if (!chars) return 'Select at least one option';
      const length = parseInt(document.getElementById('length').value);
      let password = '';
      for (let i = 0; i < length; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }
      return password;
    }

    generateBtn.addEventListener('click', () => {
      currentPassword = generatePassword();
      passwordDisplay.textContent = currentPassword;
      copyBtn.style.display = 'inline-block';
    });

    copyBtn.addEventListener('click', () => {
      if (currentPassword) {
        navigator.clipboard.writeText(currentPassword);
        alert('Password copied to clipboard!');
      }
    });
  </script>
</body>
</html>
