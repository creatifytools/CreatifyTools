<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPG to PDF Converter | CreatifyTools</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="tool-page-container">
    <a href="../index.html" class="back-link">← Back to Tools</a>
    <div class="tool-card-custom">
      <h1>📑 JPG to PDF Converter</h1>
      <p>Convert one or multiple JPG images to PDF</p>
      <input type="file" id="upload" accept="image/jpeg,image/jpg" multiple>
      <div class="preview-area" id="preview"></div>
      <button id="convertBtn" class="btn">Create PDF</button>
      <button id="downloadBtn" class="btn" style="display:none">Download PDF</button>
    </div>
  </div>
  <script src="../js/script.js"></script>
  <script>
    const upload = document.getElementById('upload');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const previewDiv = document.getElementById('preview');
    let pdfBlob = null;

    convertBtn.addEventListener('click', async () => {
      const files = Array.from(upload.files);
      if (files.length === 0) {
        alert('Please select JPG images');
        return;
      }
      previewDiv.innerHTML = '<p>Processing... 📄</p>';
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      let firstPage = true;
      
      for (let i = 0; i < files.length; i++) {
        const dataUrl = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(files[i]);
        });
        const img = new Image();
        await new Promise((resolve) => {
          img.onload = resolve;
          img.src = dataUrl;
        });
        const imgWidth = pdf.internal.pageSize.getWidth();
        const imgHeight = (img.height * imgWidth) / img.width;
        if (!firstPage) pdf.addPage();
        firstPage = false;
        pdf.addImage(img, 'JPEG', 0, 0, imgWidth, imgHeight);
      }
      pdfBlob = pdf.output('blob');
      previewDiv.innerHTML = `<p>✅ PDF created with ${files.length} image(s)</p>`;
      downloadBtn.style.display = 'inline-block';
    });

    downloadBtn.addEventListener('click', () => {
      if (pdfBlob) {
        const dataUrl = URL.createObjectURL(pdfBlob);
        window.redirectToShortlink(dataUrl, "converted.pdf", "jpg-to-pdf");
      }
    });
  </script>
</body>
</html>
