<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Reel Downloader | CreatifyTools</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="tool-page-container">
    <a href="../index.html" class="back-link">← Back to Tools</a>
    <div class="tool-card-custom" style="text-align: center;">
      <h1>📸 Instagram Reel Downloader</h1>
      <p>Paste any Instagram Reel URL to download</p>
      <input type="text" id="reelUrl" placeholder="https://www.instagram.com/reel/...">
      <button id="downloadReelBtn" class="btn">Download Reel</button>
      <p style="margin-top: 20px; color: #666; font-size: 0.85rem;">⚡ After clicking, you'll be redirected to our secure download partner</p>
    </div>
  </div>
  <script src="../js/script.js"></script>
  <script>
    const downloadBtn = document.getElementById('downloadReelBtn');
    const urlInput = document.getElementById('reelUrl');

    downloadBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url.includes('instagram.com/reel/')) {
        alert('Please enter a valid Instagram Reel URL');
        return;
      }
      window.handleInstagramDownload(url);
    });
  </script>
</body>
</html>
