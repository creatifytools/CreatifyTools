<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | CreatifyTools</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">CreatifyTools</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </nav>
  </div>

  <div class="container">
    <div class="page-hero">
      <h1>Get in Touch</h1>
      <p>Have questions, feedback, or suggestions? We'd love to hear from you!</p>
      
      <div class="contact-form-container">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Email Address">
        <textarea id="msg" rows="5" placeholder="Message"></textarea>
        <button class="btn">Send Message</button>
      </div>
      
      <div class="contact-info">
        <p>📧 Email: hello@creatifytools.com</p>
        <p>🐦 Twitter: @creatifytools</p>
        <p>💬 Discord: discord.gg/creatifytools</p>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <p>© 2025 CreatifyTools — free tools for everyone</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
